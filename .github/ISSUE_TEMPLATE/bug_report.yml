name: Bug report
description: Report a bug, regression, or broken workflow in napari-chat-assistant.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the problem.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What exact steps trigger the problem?
      placeholder: |
        1. Open napari
        2. Open Plugins -> Chat Assistant
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04, ...
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
  - type: input
    id: napari
    attributes:
      label: napari version
      placeholder: "0.x.x"
  - type: input
    id: plugin
    attributes:
      label: Plugin version
      placeholder: "1.4.3"
  - type: input
    id: ollama
    attributes:
      label: Ollama version
      placeholder: Optional
  - type: input
    id: model
    attributes:
      label: Model tag
      placeholder: nemotron-cascade-2:30b, gpt-oss:120b, ...
  - type: textarea
    id: logs
    attributes:
      label: Logs, tracebacks, or screenshots
      description: Paste any relevant traceback or log snippet from ~/.napari-chat-assistant if available.
      render: shell
