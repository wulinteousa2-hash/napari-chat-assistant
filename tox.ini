# For more information about tox, see https://tox.wiki/
[tox]
envlist = py{310,311,312,313}-{linux,macos,windows}
isolated_build = true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
package = wheel
platform =
    macos: darwin
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
    QT_QPA_PLATFORM
extras = test
deps =
    pytest-cov
commands = pytest -v --color=yes --cov=napari_chat_assistant --cov-report=xml
